<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="A dynamic and hierarchical skill matrix for tracking team proficiencies.">
    <title>Team Skill Matrix</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="index.css">
    <style>
        .control-panel {
            background: var(--bg-panel);
            padding: 1rem 1.5rem;
            border-radius: 12px;
            border: 1px solid var(--border-glass);
            display: flex;
            gap: 1rem;
            margin-bottom: 1rem;
        }
        .btn {
            background: rgba(99, 102, 241, 0.2);
            border: 1px solid rgba(99, 102, 241, 0.5);
            color: var(--text-main);
            padding: 0.5rem 1rem;
            border-radius: 6px;
            cursor: pointer;
            font-family: inherit;
            transition: background 0.2s;
        }
        .btn:hover { background: rgba(99, 102, 241, 0.4); }
        .btn-admin { background: rgba(236, 72, 153, 0.2); border-color: rgba(236, 72, 153, 0.5); }
        .btn-admin:hover { background: rgba(236, 72, 153, 0.4); }
        
        .modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6); backdrop-filter: blur(4px); z-index: 100;
            align-items: center; justify-content: center;
        }
        .modal-content {
            background: var(--bg-dark); border: 1px solid var(--border-glass);
            padding: 2rem; border-radius: 12px; width: 400px;
        }
        .modal-content h3 { margin-bottom: 1rem; }
        .modal-content input, .modal-content select {
            width: 100%; padding: 0.5rem; margin-bottom: 1rem;
            background: rgba(0,0,0,0.3); border: 1px solid var(--border-glass);
            color: white; border-radius: 4px;
        }
        .modal-actions { display: flex; justify-content: flex-end; gap: 0.5rem; }
        
        /* Interactive proficiency dots */
        .interactive-dot { cursor: pointer; }
        .interactive-dot:hover { transform: scale(1.3) !important; }
    </style>
</head>
<body>
    <div class="background-effects">
        <div class="glow glow-1"></div>
        <div class="glow glow-2"></div>
    </div>
    
    <div class="app-container">
        <header>
            <div class="header-content">
                <h1>Team Skill Matrix</h1>
                <p>Interactive capability tracking across all technical domains</p>
                <div id="userInfo" style="margin-top: 0.5rem; font-size: 0.9rem; color: #a5b4fc;"></div>
            </div>
            <div class="legend" style="flex-direction: column; align-items: flex-end;">
                <div style="display: flex; gap: 0.5rem; margin-bottom: 0.5rem;">
                    <button class="btn" onclick="window.location.href='settings.html'">Settings</button>
                    <button class="btn" id="logoutBtn" style="background: rgba(239, 68, 68, 0.2); border-color: rgba(239, 68, 68, 0.5);">Logout</button>
                </div>
                <div style="display: flex; gap: 1rem;">
                    <span class="legend-item"><span class="legend-square level-4">4</span> Expert</span>
                    <span class="legend-item"><span class="legend-square level-3">3</span> Intermediate</span>
                    <span class="legend-item"><span class="legend-square level-2">2</span> Beginner</span>
                    <span class="legend-item"><span class="legend-square level-1">1</span> None</span>
                </div>
                <div style="font-size: 0.8rem; color: var(--text-muted); margin-top: 0.3rem;">Click your own dots to update</div>
            </div>
        </header>

        <div class="control-panel" id="controlPanel">
            <div id="adminControls" style="display:none; gap: 1rem; align-items: center;">
                <button class="btn btn-admin" onclick="addWorkstation()">Add Workstation</button>
                <button class="btn btn-admin" style="background: rgba(239, 68, 68, 0.2); border-color: rgba(239, 68, 68, 0.5);" onclick="removeWorkstation()">Remove Workstation</button>
                <button class="btn btn-admin" onclick="addSkill()">Add Skill</button>
                <button class="btn btn-admin" style="background: rgba(239, 68, 68, 0.2); border-color: rgba(239, 68, 68, 0.5);" onclick="removeSkill()">Remove Skill</button>
                <div style="width: 1px; background: var(--border-glass); margin: 0 0.5rem; height: 2rem;"></div>
                <button class="btn btn-admin" onclick="addUser()">Add User</button>
                <button class="btn btn-admin" onclick="loadUsersAndOpenModal()">Manage Roles</button>
            </div>
        </div>

        <main>
            <div class="glass-panel" style="margin-bottom: 1rem; padding: 1rem; display: flex; gap: 1rem; align-items: center; justify-content: space-between; flex-wrap: wrap;">
            <div style="display: flex; gap: 1rem; align-items: center; flex: 1; flex-wrap: wrap;">
                <input type="text" id="searchInput" placeholder="Search team members (e.g. John, Jane)..." style="width: 250px; padding: 0.5rem; border-radius: 6px; border: 1px solid var(--border-glass); background: rgba(0,0,0,0.2); color: white;">
                <select id="wsFilterSelect" style="padding: 0.5rem; border-radius: 6px; border: 1px solid var(--border-glass); background: rgba(0,0,0,0.2); color: white;">
                    <option value="all">All Workstations</option>
                </select>
                <select id="sortSelect" style="padding: 0.5rem; border-radius: 6px; border: 1px solid var(--border-glass); background: rgba(0,0,0,0.2); color: white;">
                    <option value="name">Sort by Name</option>
                    <option value="score">Sort by Proficiency Score</option>
                </select>
                <!-- Zoom Slider -->
                <div style="display: flex; align-items: center; gap: 0.5rem; color: var(--text-muted); font-size: 0.9rem;">
                    <span>Zoom:</span>
                    <input type="range" id="zoomSlider" min="45" max="150" value="98" oninput="updateZoom(this.value)">
                </div>
            </div>
            <div style="display: flex; gap: 0.5rem; align-items: center;">
                <span id="saveStatus" style="font-size: 0.85rem; color: var(--text-muted); margin-right: 0.5rem;"></span>
                <button class="btn btn-primary" id="saveChangesBtn" onclick="saveChanges()" disabled>Save Changes</button>
                <button class="btn btn-outline" id="viewToggleBtn" onclick="toggleViewMode()">Switch to Detail View</button>
                <button class="btn btn-outline" onclick="exportToCSV()">Export CSV</button>
            </div>
        </div>

        <div class="glass-panel" style="overflow-x: auto; overflow-y: auto; max-height: 70vh;">
            <div class="matrix-container" id="matrixContainer">
                <div style="text-align: center; padding: 2rem;">Loading matrix data...</div>
            </div>
        </div>
        </main>
    </div>

    <!-- Modals -->
    <div id="wsModal" class="modal">
        <div class="modal-content">
            <h3>Add Workstation</h3>
            <input type="text" id="wsName" placeholder="Workstation Name (e.g. WS02 Cavity)">
            <div class="modal-actions">
                <button class="btn" onclick="closeModal('wsModal')">Cancel</button>
                <button class="btn btn-admin" onclick="submitWorkstation()">Add</button>
            </div>
        </div>
    </div>

    <div id="removeWsModal" class="modal">
        <div class="modal-content">
            <h3>Remove Workstation</h3>
            <select id="removeWsId"></select>
            <div class="modal-actions">
                <button class="btn" onclick="closeModal('removeWsModal')">Cancel</button>
                <button class="btn btn-admin" style="background: rgba(239, 68, 68, 0.2); border-color: rgba(239, 68, 68, 0.5);" onclick="submitRemoveWorkstation()">Remove</button>
            </div>
        </div>
    </div>

    <div id="skillModal" class="modal">
        <div class="modal-content">
            <h3>Add Skill</h3>
            <select id="skillWsId"></select>
            <input type="text" id="skillName" placeholder="Skill Name">
            <div class="modal-actions">
                <button class="btn" onclick="closeModal('skillModal')">Cancel</button>
                <button class="btn btn-admin" onclick="submitSkill()">Add</button>
            </div>
        </div>
    </div>

    <div id="removeSkillModal" class="modal">
        <div class="modal-content">
            <h3>Remove Skill</h3>
            <select id="removeSkillWsId" onchange="populateRemoveSkillDropdown()"></select>
            <select id="removeSkillId"></select>
            <div class="modal-actions">
                <button class="btn" onclick="closeModal('removeSkillModal')">Cancel</button>
                <button class="btn btn-admin" style="background: rgba(239, 68, 68, 0.2); border-color: rgba(239, 68, 68, 0.5);" onclick="submitRemoveSkill()">Remove</button>
            </div>
        </div>
    </div>

    <div id="addUserModal" class="modal">
        <div class="modal-content">
            <h3>Add Team Member (Admin)</h3>
            <input type="text" id="newFirstName" placeholder="First Name">
            <input type="text" id="newLastName" placeholder="Last Name">
            <input type="email" id="newEmail" placeholder="Email Address (Optional)">
            <input type="password" id="newPassword" placeholder="Initial Password (Optional)">
            <select id="newUserRole">
                <option value="user">Normal User</option>
                <option value="admin">Admin</option>
            </select>
            <div class="modal-actions">
                <button class="btn" onclick="closeModal('addUserModal')">Cancel</button>
                <button class="btn btn-admin" onclick="submitAddUser()">Create</button>
            </div>
        </div>
    </div>

    <div id="manageRolesModal" class="modal">
        <div class="modal-content">
            <h3>Manage Roles (Admin)</h3>
            <div id="userList" style="max-height: 200px; overflow-y: auto; margin-bottom: 1rem; display:flex; flex-direction:column; gap:0.5rem;"></div>
            <div class="modal-actions">
                <button class="btn" onclick="closeModal('manageRolesModal')">Close</button>
            </div>
        </div>
    </div>
    
    <script src="app.js"></script>
</body>
</html>
