<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - Skill Matrix</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="index.css">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        .auth-container {
            width: 100%;
            max-width: 400px;
            padding: 2.5rem;
            border-radius: 16px;
            background: var(--bg-panel);
            border: 1px solid var(--border-glass);
            backdrop-filter: blur(16px);
            text-align: center;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            z-index: 10;
        }
        .auth-container h2 {
            margin-bottom: 0.5rem;
            color: #fff;
        }
        .auth-container p {
            color: var(--text-muted);
            margin-bottom: 2rem;
            font-size: 0.95rem;
        }
        .form-group {
            margin-bottom: 1.5rem;
            text-align: left;
        }
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--text-muted);
            font-size: 0.85rem;
        }
        .form-group input {
            width: 100%;
            padding: 0.75rem 1rem;
            background: rgba(0,0,0,0.2);
            border: 1px solid var(--border-glass);
            border-radius: 8px;
            color: #fff;
            font-family: inherit;
            transition: border-color 0.2s, box-shadow 0.2s;
            box-sizing: border-box;
        }
        .form-group input:focus {
            outline: none;
            border-color: #6366f1;
            box-shadow: 0 0 0 2px rgba(99, 102, 241, 0.2);
        }
        .auth-btn {
            width: 100%;
            padding: 0.75rem;
            background: #6366f1;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            margin-bottom: 1rem;
        }
        .auth-btn:hover {
            background: #4f46e5;
        }
        .auth-btn:disabled {
            background: #374151;
            cursor: not-allowed;
            color: #9ca3af;
        }
        .error-msg {
            color: #ef4444;
            font-size: 0.85rem;
            margin-top: 0.5rem;
            display: none;
            text-align: center;
        }
        .success-msg {
            color: #10b981;
            font-size: 0.85rem;
            margin-top: 0.5rem;
            display: none;
            text-align: center;
        }
        .links {
            margin-top: 1.5rem;
            font-size: 0.85rem;
            color: var(--text-muted);
        }
        .links a {
            color: #818cf8;
            text-decoration: none;
        }
        .links a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="background-effects">
        <div class="glow glow-1"></div>
        <div class="glow glow-2"></div>
    </div>

    <div class="auth-container">
        <h2>Forgot Password</h2>
        <p>Enter your email address and we'll send you a 6-digit code to reset your password.</p>

        <form id="forgotForm">
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" required autocomplete="email">
            </div>

            <button type="submit" class="auth-btn" id="submitBtn">Send Reset Code</button>
            <div class="error-msg" id="errorMsg"></div>
            <div class="success-msg" id="successMsg">Code sent! Check your inbox.</div>
        </form>

        <div class="links">
            Remembered it? <a href="login.html">Sign In</a>
        </div>
    </div>

    <script src="forgot-password.js"></script>
</body>
</html>
