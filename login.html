<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Team Skill Matrix</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="index.css">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .auth-container {
            display: flex; align-items: center; justify-content: center;
            min-height: 100vh; padding: 2rem;
        }
        .auth-box {
            width: 100%; max-width: 420px; padding: 3rem;
            display: flex; flex-direction: column; gap: 2rem;
            background: rgba(20, 20, 25, 0.7);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 24px;
            backdrop-filter: blur(20px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            position: relative; overflow: hidden;
        }
        .step-container {
            display: flex; flex-direction: column; gap: 1.5rem;
            transition: opacity 0.3s ease, transform 0.3s ease;
        }
        .step-hidden {
            display: none !important;
            opacity: 0; transform: translateX(20px);
        }
        
        .auth-header h2 {
            font-size: 1.75rem; font-weight: 600; margin-bottom: 0.5rem;
            color: #fff;
        }
        .auth-header p { color: var(--text-muted); font-size: 0.95rem; line-height: 1.4; }
        
        .form-group { display: flex; flex-direction: column; gap: 0.5rem; }
        .form-group label { font-size: 0.85rem; font-weight: 500; color: #cbd5e1; }
        .form-group input:not(.otp-input) {
            background: rgba(0,0,0,0.2); border: 1px solid rgba(255,255,255,0.1);
            color: #fff; padding: 0.85rem 1rem; border-radius: 12px;
            font-size: 1rem; outline: none; transition: all 0.2s;
        }
        .form-group input:not(.otp-input):focus {
            border-color: #6366f1; box-shadow: 0 0 0 3px rgba(99,102,241,0.2);
        }
        
        .otp-container { display: flex; gap: 0.5rem; justify-content: space-between; }
        .otp-input {
            width: 3rem; height: 3.5rem; text-align: center;
            font-size: 1.5rem; font-weight: 600; border-radius: 12px;
            background: rgba(0,0,0,0.2); border: 1px solid rgba(255,255,255,0.1);
            color: #fff; outline: none; transition: all 0.2s;
        }
        .otp-input:focus { border-color: #6366f1; box-shadow: 0 0 0 3px rgba(99,102,241,0.2); }
        
        .auth-btn {
            background: #6366f1; color: #fff; border: none;
            padding: 0.85rem; border-radius: 12px; font-size: 1rem;
            font-weight: 500; cursor: pointer; transition: background 0.2s;
            width: 100%; margin-top: 0.5rem;
        }
        .auth-btn:hover:not(:disabled) { background: #4f46e5; }
        .auth-btn:disabled { opacity: 0.6; cursor: not-allowed; }
        
        .auth-switch { text-align: center; font-size: 0.9rem; color: var(--text-muted); }
        .auth-switch a { color: #818cf8; text-decoration: none; cursor: pointer; font-weight: 500;}
        .auth-switch a:hover { text-decoration: underline; }
        
        .msg { font-size: 0.85rem; text-align: center; min-height: 1.2rem; }
        .error-msg { color: #f87171; }
        .success-msg { color: #34d399; }
        
        .spinner {
            display: inline-block; width: 1rem; height: 1rem;
            border: 2px solid rgba(255,255,255,0.3); border-radius: 50%;
            border-top-color: #fff; animation: spin 1s ease-in-out infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="background-effects">
        <div class="glow glow-1"></div>
        <div class="glow glow-2"></div>
    </div>
    
    <div class="auth-container">
        <div class="auth-box">
            <!-- Step 1: Login / Email -->
            <div id="step1" class="step-container">
                <div class="auth-header">
                    <h2 id="s1Title">Sign In</h2>
                    <p id="s1Desc">Welcome back to the Team Skill Matrix.</p>
                </div>
                <div id="s1Msg" class="msg error-msg"></div>
                <form id="formStep1">
                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <input type="email" id="email" required placeholder="name@stfc.ac.uk">
                    </div>
                    <div class="form-group" id="loginPasswordGroup">
                        <label for="loginPassword" style="margin-top: 0.5rem;">Password</label>
                        <input type="password" id="loginPassword" placeholder="••••••••">
                    </div>
                    
                    <div style="text-align: right; margin-top: 0.5rem; font-size: 0.85rem;">
                        <a href="forgot-password.html" style="color: #818cf8; text-decoration: none;">Forgot Password?</a>
                    </div>
                    
                    <button type="submit" class="auth-btn" id="btnStep1">Continue</button>
                </form>
                <div class="auth-switch">
                    <span id="switchText">Don't have an account? </span>
                    <a id="switchLink">Register here</a>
                </div>
            </div>

            <!-- Step 2: Verification Code -->
            <div id="step2" class="step-container step-hidden">
                <div class="auth-header">
                    <h2>Check your inbox</h2>
                    <p>We've sent a 6-digit verification code to <strong id="verifyEmailDisplay"></strong>.</p>
                </div>
                <div id="s2Msg" class="msg error-msg"></div>
                <form id="formStep2">
                    <div class="form-group">
                        <div class="otp-container" id="otpContainer">
                            <input type="text" class="otp-input" maxlength="1" required autofocus>
                            <input type="text" class="otp-input" maxlength="1" required>
                            <input type="text" class="otp-input" maxlength="1" required>
                            <input type="text" class="otp-input" maxlength="1" required>
                            <input type="text" class="otp-input" maxlength="1" required>
                            <input type="text" class="otp-input" maxlength="1" required>
                        </div>
                    </div>
                    <button type="button" class="auth-btn" id="btnStep2" style="display:none;">Verify</button>
                </form>
            </div>

            <!-- Step 3: Profile Setup -->
            <div id="step3" class="step-container step-hidden">
                <div class="auth-header">
                    <h2>Almost done</h2>
                    <p>Set up your profile to complete registration.</p>
                </div>
                <div id="s3Msg" class="msg error-msg"></div>
                <form id="formStep3">
                    <div class="form-group">
                        <label for="firstName">First Name</label>
                        <input type="text" id="firstName" required placeholder="Jane">
                    </div>
                    <div class="form-group" style="margin-top: 0.5rem;">
                        <label for="lastName">Last Name</label>
                        <input type="text" id="lastName" required placeholder="Doe">
                    </div>
                    <div class="form-group" style="margin-top: 0.5rem;">
                        <label for="note">Note (Optional) - e.g. Apprentice, Head</label>
                        <input type="text" id="note" placeholder="Apprentice">
                    </div>
                    <div class="form-group" style="margin-top: 0.5rem;">
                        <label for="regPassword">Create a Password</label>
                        <input type="password" id="regPassword" required placeholder="••••••••">
                    </div>
                    <button type="submit" class="auth-btn" id="btnStep3">Complete Account</button>
                </form>
            </div>

        </div>
    </div>
    
    <script src="login.js"></script>
</body>
</html>
